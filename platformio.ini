; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = Watering my plant
default_envs = lolin32_lite
name = Watering-esp32

[env]
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
board_build.embed_files = crt/x509_crt_bundle.bin
lib_deps = 
    https://github.com/GyverLibs/EncButton
    https://github.com/tzapu/WiFiManager
    https://github.com/bblanchon/ArduinoJson
    https://github.com/charno/FTPClientServer
    https://github.com/govorox/SSLClient
    https://github.com/vshymanskyy/TinyGSM
    https://github.com/witnessmenow/Universal-Arduino-Telegram-Bot
    https://github.com/vshymanskyy/StreamDebugger

[env:lolin32_lite]
platform = espressif32
board = lolin32_lite
framework = arduino
monitor_filters = esp32_exception_decoder

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
monitor_filters = esp32_exception_decoder
build_flags = -DESP32C3=1
   -D ARDUINO_USB_MODE=1
   -D ARDUINO_USB_CDC_ON_BOOT=1
   -D ARDUINO_ESP32C3_DEV=1
